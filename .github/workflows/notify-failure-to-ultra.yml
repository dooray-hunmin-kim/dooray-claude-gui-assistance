            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(message)
            });
            
            if (response.ok) {
              console.log('✅ Ultra Agent 에 알림 발송 완료');
            } else {
              console.error('❌ 웹훅 발송 실패:', await response.text());
            }
